<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #121212;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    form {
      background-color: #1e1e1e;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      width: 300px;
      display: flex;
      flex-direction: column;
    }

    input {
      padding: 0.8rem;
      margin-bottom: 1rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
    }

    button {
      padding: 0.8rem;
      background-color: #1abc9c;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background-color: #16a085;
    }

    h2 {
      text-align: center;
      margin-bottom: 1rem;
      color: #1abc9c;
    }
  </style>
</head>
<body>
  <form id="login-form">
    <h2>Connexion</h2>
    <input type="text" id="nom" placeholder="Nom d'utilisateur" required />
    <input type="password" id="mot_de_passe" placeholder="Mot de passe" required />
    <button type="submit">Se connecter</button>
  </form>

  <script>
    document.getElementById("login-form").addEventListener("submit", function (e) {
      e.preventDefault();

      const nom = document.getElementById("nom").value.trim();
      const mot_de_passe = document.getElementById("mot_de_passe").value.trim();

      fetch("php/login.php", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ nom, mot_de_passe })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          localStorage.setItem("nom", data.nom);
          localStorage.setItem("role", data.role);
          window.location.href = "interface.html";
        } else {
          alert("Erreur : " + data.error);
        }
      })
      .catch(error => {
        console.error("Erreur réseau :", error);
        alert("Erreur réseau ou serveur.");
      });
    });
  </script>
</body>
</html>
